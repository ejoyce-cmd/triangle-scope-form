<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Renovations – Scope of Work</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f6; color: #222; }
.header { background: #1B3A6B; color: white; padding: 20px 28px; display: flex; align-items: center; gap: 18px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.header img { height: 72px; filter: brightness(0) invert(1); }
.header-text h1 { font-size: 1.45rem; font-weight: 800; letter-spacing: 1px; }
.header-text p { font-size: 0.82rem; opacity: 0.8; margin-top: 3px; }
.container { max-width: 860px; margin: 0 auto; padding: 22px 14px 60px; }
.card { background: white; border-radius: 10px; margin-bottom: 18px; box-shadow: 0 1px 5px rgba(0,0,0,0.09); overflow: hidden; }
.top-card { padding: 20px 22px; border-left: 5px solid #1B3A6B; }
.top-card h2 { font-size: 0.9rem; color: #1B3A6B; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.top-card input { width: 100%; padding: 10px 13px; border: 1.5px solid #ccc; border-radius: 7px; font-size: 0.97rem; }
.top-card input:focus { border-color: #1B3A6B; outline: none; }
.top-card input.error { border-color: #e74c3c; background: #fff8f8; }
.section-card { background: white; border-radius: 10px; margin-bottom: 14px; box-shadow: 0 1px 5px rgba(0,0,0,0.09); overflow: hidden; }
.section-header { background: #1B3A6B; color: white; padding: 13px 20px; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.section-header .arrow { font-size: 0.75rem; transition: transform 0.2s; }
.section-header.open .arrow { transform: rotate(180deg); }
.section-actions { background: #f0f4ff; padding: 10px 20px; display: flex; gap: 10px; border-bottom: 1px solid #e0e8ff; }
.add-room-btn { background: #1B3A6B; color: white; border: none; padding: 6px 14px; border-radius: 5px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
.remove-room-btn { background: #e74c3c; color: white; border: none; padding: 6px 14px; border-radius: 5px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
.room-divider { background: #e8f0fc; padding: 8px 20px; font-size: 0.82rem; font-weight: 700; color: #1B3A6B; border-bottom: 1px solid #d0ddf5; }
.line-item { border-bottom: 1px solid #f0f0f0; padding: 14px 20px; }
.line-item:last-child { border-bottom: none; }
.line-item.has-error { background: #fff8f8; border-left: 3px solid #e74c3c; }
.item-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 11px; }
.item-label { font-weight: 600; font-size: 0.93rem; flex: 1; padding-top: 2px; line-height: 1.35; }
.photo-badge { background: #e8f0fc; color: #1B3A6B; font-size: 0.68rem; padding: 2px 7px; border-radius: 9px; font-weight: 700; white-space: nowrap; flex-shrink: 0; margin-top: 3px; }
.add-label-input { flex: 1; border: 1.5px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 0.93rem; font-weight: 600; }
.remove-item-btn { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 1rem; padding: 2px 5px; flex-shrink: 0; }
.item-fields { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; margin-bottom: 9px; }
.field-group label { display: block; font-size: 0.7rem; color: #777; margin-bottom: 3px; font-weight: 700; text-transform: uppercase; }
.field-group select, .field-group input[type=number] { width: 100%; padding: 7px 9px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 0.88rem; background: white; }
.field-group select.error { border-color: #e74c3c !important; background: #fff8f8; }
.field-group select:focus, .field-group input:focus { border-color: #1B3A6B; outline: none; }
.cost-wrap { position: relative; }
.cost-wrap span { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #999; font-size: 0.88rem; pointer-events: none; }
.cost-wrap input { padding-left: 20px !important; }
.comment-row { margin-bottom: 9px; }
.comment-input { width: 100%; padding: 7px 9px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 0.88rem; }
.comment-input:focus { border-color: #1B3A6B; outline: none; }
.photo-area { border: 1.5px dashed #1B3A6B; border-radius: 8px; padding: 10px 14px; background: #f8f9ff; margin-top: 4px; }
.photo-area.dragover { background: #dce7ff; border-style: solid; }
.photo-controls { display: flex; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.photo-btn { background: #1B3A6B; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
.photo-btn.secondary { background: white; color: #1B3A6B; border: 1.5px solid #1B3A6B; }
.photo-drop-hint { font-size: 0.72rem; color: #888; margin-bottom: 6px; }
.photo-thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.photo-thumb-wrap { position: relative; }
.photo-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 5px; border: 1.5px solid #ddd; cursor: pointer; }
.photo-thumb-del { position: absolute; top: -5px; right: -5px; background: #c0392b; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.photo-req { font-size: 0.72rem; margin-top: 4px; color: #888; }
.photo-req.met { color: #27ae60; font-weight: 700; }
.photo-req.unmet { color: #e74c3c; font-weight: 700; }
.hidden-file { display: none; }
.add-item-btn { background: none; border: 1.5px dashed #1B3A6B; color: #1B3A6B; padding: 11px; width: 100%; cursor: pointer; font-size: 0.88rem; font-weight: 700; }
.add-item-btn:hover { background: #eef2fb; }
.submit-card { padding: 22px; border-left: 5px solid #1B3A6B; }
.submit-card h3 { color: #1B3A6B; margin-bottom: 14px; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; }
.name-group { margin-bottom: 14px; }
.name-group label { display: block; font-size: 0.78rem; color: #777; margin-bottom: 5px; font-weight: 700; text-transform: uppercase; }
.name-group input { width: 100%; padding: 10px 13px; border: 1.5px solid #ccc; border-radius: 7px; font-size: 0.97rem; }
.name-group input.error { border-color: #e74c3c; background: #fff8f8; }
.submit-btn { background: #1B3A6B; color: white; border: none; padding: 14px; border-radius: 7px; font-size: 1rem; font-weight: 800; cursor: pointer; width: 100%; }
.submit-btn:hover { background: #142d54; }
.submit-btn:disabled { background: #aaa; cursor: not-allowed; }
.validation-summary { background: #fff0f0; border: 1.5px solid #e74c3c; border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; color: #c0392b; font-size: 0.88rem; font-weight: 600; display: none; }
.validation-summary ul { margin-top: 6px; padding-left: 18px; }
.validation-summary li { margin-bottom: 4px; cursor: pointer; text-decoration: underline dotted; }
.banner { padding: 14px 18px; border-radius: 8px; margin-bottom: 18px; font-weight: 700; font-size: 0.92rem; display: none; }
.banner-success { background: #27ae60; color: white; }
.banner-error { background: #e74c3c; color: white; }
.progress { background: #eef2fb; border: 1px solid #1B3A6B; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.85rem; color: #1B3A6B; font-weight: 600; display: none; }
.lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.88); z-index: 999; align-items: center; justify-content: center; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 90vw; max-height: 88vh; border-radius: 6px; }
.lightbox-close { position: absolute; top: 18px; right: 24px; color: white; font-size: 2rem; cursor: pointer; background: none; border: none; }
@media(max-width: 580px) { .item-fields { grid-template-columns: 1fr 1fr; } .header img { height: 52px; } .header-text h1 { font-size: 1.1rem; } }
</style>
</head>
<body>
<div class="header">
  <img id="logo" alt="Triangle Renovations">
  <div class="header-text">
    <h1>TRIANGLE RENOVATIONS</h1>
    <p>Property Scope of Work — Field Inspection Form</p>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<div class="container">
  <div id="banner" class="banner"></div>
  <div id="progress" class="progress"></div>
  <div id="valSummary" class="validation-summary"></div>
  <div class="card top-card">
    <h2>Property Address</h2>
    <input type="text" id="propertyAddress" placeholder="e.g. 10346 Matchlock Dr, Orlando, FL 32821">
  </div>
  <div id="sectionsContainer"></div>
  <div class="card submit-card">
    <h3>Technician Information</h3>
    <div class="name-group">
      <label>Your Name</label>
      <input type="text" id="techName" placeholder="Full name">
    </div>
    <button class="submit-btn" id="submitBtn">Submit Scope of Work</button>
  </div>
</div>

<script>
// ─── SECTION DEFINITIONS ───────────────────────────────────────────────────
var EXTERIOR = ['Overview – Please provide general photos','Lockbox – Photo showing combination & keys inside','Foundation – Cracks, settlement, water intrusion','Roof – Missing/damaged shingles, age, flashing','Walls/Siding – Peeling paint, cracks, wood rot','Windows & Doors – Sealing, locks, no broken glass','Stairs & Handrails – Safe, stable, non-slip','Driveway & Walkways – Cracks or tripping hazards','Gutters – Detached sections, debris buildup','Landscaping – Overgrowth, dead plants, irrigation','Garage Door – Function, damage, auto-reverse','Fence Condition','Mailbox Condition'];
var LIVING   = ['Overview – Please provide general photos','Walls & Ceiling – Cracks, peeling paint, moisture','Floors – Even, no loose boards or tripping hazards','Windows – Open/close easily, sealed, no cracks','Electrical Outlets – Functioning properly','Light Fixtures – All functioning','Smoke/CO2 Detectors – Placement and working'];
var KITCHEN  = ['Overview – Please provide general photos','Under-Sink Plumbing – Check for leaks','Appliances (Stove, Refrigerator) – Functioning, please include photos','Outlets – GFCI protected and functioning','Ventilation – Hood/exhaust working','Cabinet Condition – Hinges, doors, wear','Countertop Condition','Faucet – Leaks, pressure, condition'];
var BEDROOM  = ['Overview – Please provide general photos','Walls & Ceilings – Cracks, leaks, water damage','Windows – Locking mechanism and sealing','Outlets & Light Fixtures – Working properly','Flooring – Tripping hazards or damage','Closets – Shelving, doors, usability','Door Hardware – Functioning'];
var BATHROOM = ['Overview – Please provide general photos','Walls & Ceilings – Cracks, leaks, water damage','Toilet – Leaks around base','Sink Drainage – Proper flow and water pressure','Tub/Shower – Drainage and water damage','Ventilation – Prevents moisture buildup','Outlets – GFCI protected and working','Caulk Condition – Tub, shower, sink','Fixture Condition – Vanity, faucets'];
var MECHANICAL = ['Utility Meter Photos – Gas, water, electric','Water Heater – Age, corrosion, leaks; photo of data/serial plate','Electrical Panel – Open cover, obvious issues','HVAC – Age, filter condition, obvious leaks; photo of data/serial plate','Replace Batteries & HVAC Filters','Attic/Basement – Insulation, ventilation, wiring','Plumbing Leaks – Visible water intrusion'];
var SAFETY   = ['Smoke Detectors – Fresh batteries, working','CO Detectors – Near bedrooms','Stair Handrails – Present, stable, non-slip','Stairway Lighting – Adequate','Mold – Visible growth on walls, ceilings, floors','Pest Activity – Droppings, nests, damage','Termite Signs – Mud tubes, wood damage','Asbestos Risk – Older insulation or floor tiles','Emergency Vehicle Access – Clear and accessible','Full Home Deep Cleaning'];

function newItem(label) { return { label: label, condition: '', priority: '', cost: '', comments: '', photos: [] }; }
function newItems(defs) { return defs.map(newItem); }
function newRoom(label, n, defs) { return { name: label + ' ' + n, items: newItems(defs) }; }

// ─── STATE ─────────────────────────────────────────────────────────────────
var state = [
  { id:'exterior',   title:'EXTERIOR',       type:'standard',  collapsed:false, defs:EXTERIOR,    items:newItems(EXTERIOR) },
  { id:'living',     title:'LIVING ROOM',    type:'standard',  collapsed:false, defs:LIVING,      items:newItems(LIVING) },
  { id:'kitchen',    title:'KITCHEN',        type:'multiroom', collapsed:false, defs:KITCHEN,     label:'Kitchen',  rooms:[newRoom('Kitchen',1,KITCHEN)] },
  { id:'bedrooms',   title:'BEDROOMS',       type:'multiroom', collapsed:false, defs:BEDROOM,     label:'Bedroom',  rooms:[newRoom('Bedroom',1,BEDROOM)] },
  { id:'bathrooms',  title:'BATHROOMS',      type:'multiroom', collapsed:false, defs:BATHROOM,    label:'Bathroom', rooms:[newRoom('Bathroom',1,BATHROOM)] },
  { id:'mechanical', title:'MECHANICAL',     type:'standard',  collapsed:false, defs:MECHANICAL,  items:newItems(MECHANICAL) },
  { id:'safety',     title:'SAFETY HAZARDS', type:'standard',  collapsed:false, defs:SAFETY,      items:newItems(SAFETY) },
  { id:'additional', title:'ADDITIONAL ITEMS',type:'additional',collapsed:false, items:[] }
];

// ─── AUTO-SAVE ──────────────────────────────────────────────────────────────
var SAVE_KEY = 'tr_sow_v4';

function saveState() {
  try {
    var data = {
      address: document.getElementById('propertyAddress').value,
      tech: document.getElementById('techName').value,
      sections: state.map(function(s) {
        var copy = { id: s.id, collapsed: s.collapsed };
        if (s.type === 'multiroom') {
          copy.rooms = s.rooms.map(function(r) {
            return { name: r.name, items: r.items.map(function(it) {
              return { label:it.label, condition:it.condition, priority:it.priority, cost:it.cost, comments:it.comments };
            })};
          });
        } else {
          copy.items = s.items.map(function(it) {
            return { label:it.label, condition:it.condition, priority:it.priority, cost:it.cost, comments:it.comments };
          });
        }
        return copy;
      })
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadState() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data.address) document.getElementById('propertyAddress').value = data.address;
    if (data.tech) document.getElementById('techName').value = data.tech;
    if (!data.sections) return;
    data.sections.forEach(function(saved) {
      var section = state.find(function(s) { return s.id === saved.id; });
      if (!section) return;
      section.collapsed = saved.collapsed || false;
      if (section.type === 'multiroom' && saved.rooms) {
        section.rooms = saved.rooms.map(function(r) {
          return { name: r.name, items: r.items.map(function(it) {
            return { label:it.label, condition:it.condition||'', priority:it.priority||'', cost:it.cost||'', comments:it.comments||'', photos:[] };
          })};
        });
      } else if (saved.items) {
        // For standard/additional: restore items but keep original defs for standard
        if (section.type === 'standard') {
          saved.items.forEach(function(saved_item, i) {
            if (section.items[i]) {
              section.items[i].condition = saved_item.condition || '';
              section.items[i].priority = saved_item.priority || '';
              section.items[i].cost = saved_item.cost || '';
              section.items[i].comments = saved_item.comments || '';
            }
          });
        } else {
          section.items = saved.items.map(function(it) {
            return { label:it.label, condition:it.condition||'', priority:it.priority||'', cost:it.cost||'', comments:it.comments||'', photos:[] };
          });
        }
      }
    });
  } catch(e) { console.log('loadState error:', e); }
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function sectionTotal(section) {
  var t = 0;
  if (section.type === 'multiroom') {
    section.rooms.forEach(function(r) { r.items.forEach(function(it) { t += parseFloat(it.cost)||0; }); });
  } else {
    section.items.forEach(function(it) { t += parseFloat(it.cost)||0; });
  }
  return t;
}

// ─── PHOTO AREA ─────────────────────────────────────────────────────────────
function buildPhotoArea(item) {
  var isOverview = item.label && item.label.toLowerCase().indexOf('overview') >= 0;
  var minPhotos = isOverview ? 4 : 2;
  var count = item.photos.length;
  var met = count >= minPhotos;

  var area = document.createElement('div');
  area.className = 'photo-area';

  var controls = document.createElement('div');
  controls.className = 'photo-controls';

  var camBtn = document.createElement('button'); camBtn.className = 'photo-btn'; camBtn.type = 'button'; camBtn.textContent = '📷 Camera';
  var fileBtn = document.createElement('button'); fileBtn.className = 'photo-btn secondary'; fileBtn.type = 'button'; fileBtn.textContent = '📁 Browse';
  var dirBtn = document.createElement('button'); dirBtn.className = 'photo-btn secondary'; dirBtn.type = 'button'; dirBtn.textContent = '📂 Folder';

  var camInp = document.createElement('input'); camInp.type='file'; camInp.accept='image/*'; camInp.capture='environment'; camInp.multiple=true; camInp.className='hidden-file';
  var fileInp = document.createElement('input'); fileInp.type='file'; fileInp.accept='image/*'; fileInp.multiple=true; fileInp.className='hidden-file';
  var dirInp = document.createElement('input'); dirInp.type='file'; dirInp.accept='image/*'; dirInp.multiple=true; dirInp.className='hidden-file'; dirInp.webkitdirectory=true;

  function addFiles(files) {
    Array.from(files).forEach(function(f) {
      var r = new FileReader();
      r.onload = function(e) { item.photos.push({ name:f.name, data:e.target.result }); saveState(); render(); };
      r.readAsDataURL(f);
    });
  }

  camBtn.onclick = function() { camInp.click(); };
  fileBtn.onclick = function() { fileInp.click(); };
  dirBtn.onclick = function() { dirInp.click(); };
  camInp.onchange = function() { addFiles(this.files); this.value=''; };
  fileInp.onchange = function() { addFiles(this.files); this.value=''; };
  dirInp.onchange = function() { addFiles(this.files); this.value=''; };

  area.ondragover = function(e) { e.preventDefault(); area.classList.add('dragover'); };
  area.ondragleave = function() { area.classList.remove('dragover'); };
  area.ondrop = function(e) {
    e.preventDefault(); area.classList.remove('dragover');
    var files = e.dataTransfer.items ? Array.from(e.dataTransfer.items).filter(function(i){return i.kind==='file';}).map(function(i){return i.getAsFile();}) : Array.from(e.dataTransfer.files);
    addFiles(files);
  };

  controls.appendChild(camBtn); controls.appendChild(fileBtn); controls.appendChild(dirBtn);
  controls.appendChild(camInp); controls.appendChild(fileInp); controls.appendChild(dirInp);
  area.appendChild(controls);

  var hint = document.createElement('div'); hint.className='photo-drop-hint'; hint.textContent='Or drag & drop photos here';
  area.appendChild(hint);

  var thumbs = document.createElement('div'); thumbs.className='photo-thumbs';
  item.photos.forEach(function(p, pi) {
    var wrap = document.createElement('div'); wrap.className='photo-thumb-wrap';
    var img = document.createElement('img'); img.className='photo-thumb'; img.src=p.data;
    (function(d){img.onclick=function(){document.getElementById('lightboxImg').src=d;document.getElementById('lightbox').classList.add('open');};})(p.data);
    var del = document.createElement('button'); del.className='photo-thumb-del'; del.textContent='✕';
    (function(obj,i){del.onclick=function(e){e.stopPropagation();obj.photos.splice(i,1);saveState();render();};})(item,pi);
    wrap.appendChild(img); wrap.appendChild(del); thumbs.appendChild(wrap);
  });
  area.appendChild(thumbs);

  var req = document.createElement('div');
  req.className = 'photo-req' + (met?' met':(count>0?' unmet':''));
  req.textContent = met ? '✓ '+count+' photo'+(count>1?'s':'')+' — requirement met' : count+' / '+minPhotos+' required photo'+(minPhotos>1?'s':'')+(count>0?' (need '+(minPhotos-count)+' more)':'');
  area.appendChild(req);
  return area;
}

// ─── RENDER ITEM ────────────────────────────────────────────────────────────
function buildItem(item, rowId, isAdditional, sectionRef) {
  var row = document.createElement('div'); row.className='line-item'; row.id=rowId;

  var top = document.createElement('div'); top.className='item-top';
  if (isAdditional) {
    var li = document.createElement('input'); li.type='text'; li.className='add-label-input'; li.placeholder='Describe item...'; li.value=item.label;
    (function(obj){li.oninput=function(){obj.label=this.value;saveState();};})(item);
    top.appendChild(li);
    var rb = document.createElement('button'); rb.className='remove-item-btn'; rb.textContent='X';
    (function(sec,obj){rb.onclick=function(){var i=sec.items.indexOf(obj);if(i>=0)sec.items.splice(i,1);saveState();render();};})(sectionRef,item);
    top.appendChild(rb);
  } else {
    var ls = document.createElement('span'); ls.className='item-label'; ls.textContent=item.label; top.appendChild(ls);
  }
  var badge = document.createElement('span'); badge.className='photo-badge'; badge.textContent='Photos Required'; top.appendChild(badge);
  row.appendChild(top);

  var fields = document.createElement('div'); fields.className='item-fields';

  // Condition
  var cg = document.createElement('div'); cg.className='field-group'; cg.innerHTML='<label>Condition <span style="color:#e74c3c">*</span></label>';
  var cSel = document.createElement('select'); cSel.id='cond_'+rowId;
  cSel.innerHTML='<option value="">Select...</option><option>Good</option><option>Fair</option><option>Poor</option><option>N/A</option>'; cSel.value=item.condition;
  (function(obj){cSel.onchange=function(){obj.condition=this.value;this.classList.remove('error');saveState();};})(item);
  cg.appendChild(cSel); fields.appendChild(cg);

  // Priority
  var pg = document.createElement('div'); pg.className='field-group'; pg.innerHTML='<label>Priority <span style="color:#e74c3c">*</span></label>';
  var pSel = document.createElement('select'); pSel.id='pri_'+rowId;
  pSel.innerHTML='<option value="">Select...</option><option>Must Do</option><option>High</option><option>Optional</option>'; pSel.value=item.priority;
  (function(obj){pSel.onchange=function(){obj.priority=this.value;this.classList.remove('error');saveState();};})(item);
  pg.appendChild(pSel); fields.appendChild(pg);

  // Cost
  var costg = document.createElement('div'); costg.className='field-group'; costg.innerHTML='<label>Cost ($)</label>';
  var cw = document.createElement('div'); cw.className='cost-wrap';
  var ds = document.createElement('span'); ds.textContent='$';
  var ci = document.createElement('input'); ci.type='number'; ci.min='0'; ci.step='0.01'; ci.placeholder='0.00'; ci.value=item.cost;
  (function(obj){ci.oninput=function(){obj.cost=this.value;saveState();};})(item);
  cw.appendChild(ds); cw.appendChild(ci); costg.appendChild(cw); fields.appendChild(costg);
  row.appendChild(fields);

  // Comments
  var cr = document.createElement('div'); cr.className='comment-row';
  var cin = document.createElement('input'); cin.type='text'; cin.className='comment-input'; cin.placeholder='Comments / notes...'; cin.value=item.comments;
  (function(obj){cin.oninput=function(){obj.comments=this.value;saveState();};})(item);
  cr.appendChild(cin); row.appendChild(cr);

  row.appendChild(buildPhotoArea(item));
  return row;
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  var container = document.getElementById('sectionsContainer');
  container.innerHTML = '';

  state.forEach(function(section, si) {
    var card = document.createElement('div'); card.className='section-card';
    var total = sectionTotal(section);
    var totalStr = total > 0 ? ' $'+total.toFixed(2) : '';

    var hdr = document.createElement('div');
    hdr.className = 'section-header' + (section.collapsed ? '' : ' open');
    hdr.innerHTML = '<span>'+section.title+'</span><span style="display:flex;align-items:center;gap:10px;font-size:0.85rem">'+(totalStr?'<span>'+totalStr+'</span>':'')+'<span class="arrow">▲</span></span>';
    (function(sec){hdr.onclick=function(){sec.collapsed=!sec.collapsed;saveState();render();};})(section);
    card.appendChild(hdr);

    if (!section.collapsed) {
      if (section.type === 'multiroom') {
        var actions = document.createElement('div'); actions.className='section-actions';
        var addBtn = document.createElement('button'); addBtn.className='add-room-btn'; addBtn.textContent='+ Add '+section.label;
        (function(sec){addBtn.onclick=function(){sec.rooms.push(newRoom(sec.label,sec.rooms.length+1,sec.defs));saveState();render();};})(section);
        actions.appendChild(addBtn);
        if (section.rooms.length > 1) {
          var rmBtn = document.createElement('button'); rmBtn.className='remove-room-btn'; rmBtn.textContent='- Remove '+section.label+' '+section.rooms.length;
          (function(sec){rmBtn.onclick=function(){sec.rooms.pop();saveState();render();};})(section);
          actions.appendChild(rmBtn);
        }
        card.appendChild(actions);
        section.rooms.forEach(function(room, ri) {
          if (section.rooms.length > 1) {
            var div = document.createElement('div'); div.className='room-divider'; div.textContent=room.name; card.appendChild(div);
          }
          room.items.forEach(function(item, ii) {
            card.appendChild(buildItem(item, 'r'+si+'_'+ri+'_'+ii, false, null));
          });
        });

      } else if (section.type === 'additional') {
        section.items.forEach(function(item, ii) {
          card.appendChild(buildItem(item, 'r'+si+'_'+ii, true, section));
        });
        var addItemBtn = document.createElement('button'); addItemBtn.className='add-item-btn'; addItemBtn.textContent='+ Add Item';
        (function(sec){addItemBtn.onclick=function(){sec.items.push(newItem(''));saveState();render();};})(section);
        card.appendChild(addItemBtn);

      } else {
        section.items.forEach(function(item, ii) {
          card.appendChild(buildItem(item, 'r'+si+'_'+ii, false, null));
        });
      }
    }
    container.appendChild(card);
  });
}

// ─── VALIDATION ─────────────────────────────────────────────────────────────
function validate() {
  var errors = [];
  var addrEl = document.getElementById('propertyAddress');
  var techEl = document.getElementById('techName');
  addrEl.classList.remove('error'); techEl.classList.remove('error');
  if (!addrEl.value.trim()) { errors.push({ msg:'Property address is required', id:'propertyAddress' }); addrEl.classList.add('error'); }
  if (!techEl.value.trim()) { errors.push({ msg:'Technician name is required', id:'techName' }); techEl.classList.add('error'); }

  function checkItem(item, label, rowId) {
    if (!item.label) return;
    var hasErr = false;
    var rowEl = document.getElementById(rowId);
    if (!item.condition) { errors.push({ msg:label+' — Condition required', id:rowId }); hasErr=true; document.getElementById('cond_'+rowId) && document.getElementById('cond_'+rowId).classList.add('error'); }
    if (!item.priority) { errors.push({ msg:label+' — Priority required', id:rowId }); hasErr=true; document.getElementById('pri_'+rowId) && document.getElementById('pri_'+rowId).classList.add('error'); }
    var isOverview = item.label.toLowerCase().indexOf('overview') >= 0;
    var minP = isOverview ? 4 : 2;
    if (item.photos.length < minP) { errors.push({ msg:label+' — '+minP+' photo'+(minP>1?'s':'')+' required ('+item.photos.length+' uploaded)', id:rowId }); hasErr=true; }
    if (rowEl) rowEl.classList.toggle('has-error', hasErr);
  }

  state.forEach(function(section, si) {
    if (section.type === 'multiroom') {
      section.rooms.forEach(function(room, ri) {
        room.items.forEach(function(item, ii) { checkItem(item, room.name+': '+item.label.substring(0,30), 'r'+si+'_'+ri+'_'+ii); });
      });
    } else {
      section.items.forEach(function(item, ii) { checkItem(item, section.title+': '+(item.label||'').substring(0,30), 'r'+si+'_'+ii); });
    }
  });
  return errors;
}

// ─── BUILD REPORT ────────────────────────────────────────────────────────────
function buildReport(address, tech) {
  var lines = ['TRIANGLE RENOVATIONS — SCOPE OF WORK','========================================','Property: '+address,'Submitted By: '+tech,'Date: '+new Date().toLocaleString(),''];
  var grandTotal = 0; var photoCount = 0;
  state.forEach(function(section) {
    var hasContent = section.type==='multiroom' ? section.rooms.some(function(r){return r.items.some(function(i){return i.label;});}) : section.items.some(function(i){return i.label;});
    if (!hasContent) return;
    lines.push('=== '+section.title+' ===');
    function addItem(item, prefix) {
      if (!item.label) return;
      lines.push((prefix||'')+'* '+item.label);
      lines.push((prefix||'')+'  Condition: '+item.condition+' | Priority: '+item.priority);
      var c = parseFloat(item.cost)||0; if(c>0){lines.push((prefix||'')+'  Cost: $'+c.toFixed(2));grandTotal+=c;}
      if (item.comments) lines.push((prefix||'')+'  Notes: '+item.comments);
      if (item.photos.length>0){lines.push((prefix||'')+'  Photos: '+item.photos.length);photoCount+=item.photos.length;}
    }
    if (section.type==='multiroom') { section.rooms.forEach(function(r){if(section.rooms.length>1)lines.push('-- '+r.name+' --');r.items.forEach(function(i){addItem(i,'  ');});}); }
    else { section.items.forEach(function(i){addItem(i,'  ');}); }
    lines.push('');
  });
  lines.push('========================================','TOTAL FIELD COST: $'+grandTotal.toFixed(2),'PHOTOS CAPTURED: '+photoCount,'========================================');
  return { text:lines.join('\n'), grandTotal:grandTotal, photoCount:photoCount };
}

// ─── COLLECT PHOTOS ──────────────────────────────────────────────────────────
function collectPhotos() {
  var all = [];
  state.forEach(function(section) {
    if (section.type==='multiroom') {
      section.rooms.forEach(function(room) {
        room.items.forEach(function(item) {
          item.photos.forEach(function(p){ all.push({ data:p.data, name:p.name||'photo.jpg', tag:section.title+' - '+room.name+' - '+item.label }); });
        });
      });
    } else {
      section.items.forEach(function(item) {
        item.photos.forEach(function(p){ all.push({ data:p.data, name:p.name||'photo.jpg', tag:section.title+' - '+item.label }); });
      });
    }
  });
  return all;
}

// ─── STRIP PHOTOS FROM SECTIONS ──────────────────────────────────────────────
function stripSections() {
  return state.map(function(section) {
    var s = { id:section.id, title:section.title, type:section.type };
    function stripItems(items) {
      return items.map(function(it) {
        return { label:it.label, condition:it.condition, priority:it.priority, cost:it.cost, comments:it.comments, photoCount:it.photos.length };
      });
    }
    if (section.type==='multiroom') {
      s.rooms = section.rooms.map(function(r){ return { name:r.name, items:stripItems(r.items) }; });
    } else {
      s.items = stripItems(section.items);
    }
    return s;
  });
}

// ─── SCROLL TO ITEM ──────────────────────────────────────────────────────────
function scrollToItem(id) {
  var el = document.getElementById(id);
  if (el) { el.scrollIntoView({ behavior:'smooth', block:'center' }); el.style.outline='2px solid #e74c3c'; setTimeout(function(){el.style.outline='';},2000); }
}

// ─── SUBMIT ──────────────────────────────────────────────────────────────────
document.getElementById('submitBtn').onclick = async function() {
  // Expand all sections for validation
  state.forEach(function(s){ s.collapsed=false; }); render();

  var errors = validate();
  var valDiv = document.getElementById('valSummary');
  if (errors.length > 0) {
    var html = '<strong>Please fix the following ('+errors.length+' issues):</strong><ul>';
    errors.slice(0,20).forEach(function(e){ html+='<li onclick="scrollToItem(\''+e.id+'\')">'+e.msg+'</li>'; });
    if (errors.length>20) html+='<li>...and '+(errors.length-20)+' more</li>';
    html+='</ul>';
    valDiv.innerHTML=html; valDiv.style.display='block'; window.scrollTo(0,0); return;
  }
  valDiv.style.display='none';

  var btn = document.getElementById('submitBtn');
  var prog = document.getElementById('progress');
  btn.disabled=true; btn.textContent='Submitting...';
  prog.style.display='block'; prog.textContent='⏳ Submitting — please wait...';
  window.scrollTo(0,0);

  var address = document.getElementById('propertyAddress').value.trim();
  var tech = document.getElementById('techName').value.trim();
  var report = buildReport(address, tech);
  var allPhotos = collectPhotos();
  var sectionsClean = stripSections();

  try {
    var BATCH = 2;
    var res = await fetch('/.netlify/functions/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        address: address,
        tech: tech,
        reportText: report.text,
        grandTotal: report.grandTotal,
        sections: sectionsClean,
        photos: allPhotos.slice(0, BATCH)
      })
    });
    var data = await res.json();

    if (data.success) {
      var r = data.results;
      var totalPhotos = r.photos || 0;
      var ccProjectId = r.ccProjectId;

      // Upload remaining photos in batches
      if (allPhotos.length > BATCH && ccProjectId) {
        for (var i = BATCH; i < allPhotos.length; i += BATCH) {
          prog.textContent = '⏳ Uploading photos ' + (i+1) + ' of ' + allPhotos.length + '...';
          try {
            var bRes = await fetch('/.netlify/functions/submit', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ photosOnly:true, ccProjectId:ccProjectId, photos:allPhotos.slice(i,i+BATCH) })
            });
            var bData = await bRes.json();
            if (bData.success) totalPhotos += bData.results.photos || 0;
          } catch(e) {}
        }
      }

      prog.style.display='none';
      var banner = document.getElementById('banner');
      banner.className='banner banner-success';
      banner.innerHTML = '✅ Scope submitted successfully!<br>' +
        (r.monday ? '✓ Monday.com updated. ' : '⚠ Monday.com issue. ') +
        (r.pdf ? '✓ PDF attached. ' : '⚠ PDF issue. ') +
        (r.companycam ? '✓ CompanyCam project created. ' : '⚠ CompanyCam issue. ') +
        (totalPhotos > 0 ? '✓ '+totalPhotos+' photo(s) uploaded with tags. ' : (allPhotos.length>0 ? '⚠ Photo upload issue. ' : '')) +
        (r.errors && r.errors.length>0 ? '<br><small>'+r.errors.join(' | ')+'</small>' : '');
      banner.style.display='block';
      try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
    } else {
      prog.style.display='none';
      var banner = document.getElementById('banner');
      banner.className='banner banner-error';
      banner.innerHTML='⚠ Submission error: '+(data.error||'Unknown error');
      banner.style.display='block';
    }
  } catch(err) {
    prog.style.display='none';
    var banner = document.getElementById('banner');
    banner.className='banner banner-error';
    banner.innerHTML='⚠ Could not reach server. Check connection and try again.';
    banner.style.display='block';
  }

  btn.disabled=false; btn.textContent='Submit Scope of Work';
};
